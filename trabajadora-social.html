<div id="app" style="display:block">

<div class="modal-fondo" id="modal-fondo">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-titulo" id="modal-titulo"></div>

    </div>
    <div id="modal-body"></div>

<script>
const NAV_ITEMS = [
  { id: 'panel-s', label: 'Panel principal' },
  { id: 'periodos', label: 'Periodos' },
  { id: 'verificacion', label: 'Verificar documentos' },
  { id: 'aprobacion', label: 'Aprobación / Denegación' },
  { id: 'noticias', label: 'Noticias' },
];

function buildNav() {
  const nav = document.getElementById('nav-items');
  nav.innerHTML = `<div class="nav-etiqueta">Menú</div>` +
    NAV_ITEMS.map(n =>
      `<div class="nav-item" id="nav-${n.id}" onclick="navigate('${n.id}')">${n.label}</div>`
    ).join('');
}

function navigate(id) {
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  const navEl = document.getElementById('nav-' + id);
  if (navEl) navEl.classList.add('active');
  document.querySelectorAll('.pagina').forEach(p => p.classList.remove('active'));
  const pagina = document.getElementById('page-' + id);
  if (pagina) pagina.classList.add('active');
}

function openModal(title, html) {
  document.getElementById('modal-titulo').textContent = title;
  document.getElementById('modal-body').innerHTML = html;
  document.getElementById('modal-fondo').classList.add('open');
}
function closeModal() { document.getElementById('modal-fondo').classList.remove('open'); }
