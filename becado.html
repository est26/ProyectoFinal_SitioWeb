<!DOCTYPE html>
<html lang="es">
<head>

  <title>Sistema de Becas — Becado</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div id="app" style="display:block">
  <aside class="sidebar">
    <div class="sidebar-header">
      <div id="sb-avatar" class="sidebar-avatar becado">BE</div>
      <div class="nombre-app">Sistema de Becas</div>
      <div class="nombre-rol" id="sb-rolename">Becado</div>
    </div>
    <div class="nav-seccion" id="nav-items"></div>
    <div class="sidebar-footer">
      <button class="boton-salir" onclick="window.location.href='index.html'">
        <span></span> Cerrar sesión

    </div>
  </aside>
  <main class="main" id="main-content"></main>
</div>

<div class="modal-fondo" id="modal-fondo">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-titulo" id="modal-titulo"></div>
      <button class="boton-cerrar" onclick="closeModal()">×</button>
    </div>
    <div id="modal-body"></div>
  </div>

<script>
const NAV_ITEMS = [
  { id: 'panel-b', label: 'Panel principal' },
  { id: 'expediente', label: 'Mi expediente' },
  { id: 'renovacion', label: 'Solicitud de renovación' },
  { id: 'justificacion', label: 'Justificación de cursos' },
  { id: 'apelacion', label: 'Apelación' },
];

function buildNav() {
  const nav = document.getElementById('nav-items');
  nav.innerHTML = `<div class="nav-etiqueta">Menú</div>` +
    NAV_ITEMS.map(n =>
      `<div class="nav-item" id="nav-${n.id}" onclick="navigate('${n.id}')">${n.label}</div>`
    ).join('');
}

function navigate(id) {
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  const navEl = document.getElementById('nav-' + id);
  if (navEl) navEl.classList.add('active');
  document.querySelectorAll('.pagina').forEach(p => p.classList.remove('active'));
  const pagina = document.getElementById('page-' + id);
  if (pagina) pagina.classList.add('active');
}

function openModal(title, html) {
  document.getElementById('modal-titulo').textContent = title;
  document.getElementById('modal-body').innerHTML = html;
  document.getElementById('modal-fondo').classList.add('open');
}
function closeModal() { document.getElementById('modal-fondo').classList.remove('open'); }

/* PAGINAS DE BECADO */

</div>`;
}

Faltante</span> <button class="boton boton-sm boton-primario">Subir</button> </div> </div> <div style="display:flex;gap:12px;margin-top:20px"> <button class="boton boton-primario"> Guardar cambios</button> <button class="boton boton-contorno">Cancelar</button> </div>
</div>`;

ton> <button class="boton boton-contorno">Guardar borrador</button> </div>

function pageJustificacion() {

</div>`;
}

g>Al presentar esta apelación declaro que</strong> la información proporcionada es verídica y completa. Entiendo que presentar información falsa puede resultar en la cancelación definitiva de la beca.
    </div> <div style="display:flex;gap:12px"> <button class="boton boton-primario" onclick="openModal('Apelación registrada', '<div style=\'text-align:center;padding:16px 0\'><div style=\'font-size:48px;margin-bottom:12px\'></div><p style=\'font-size:16px;font-weight:600;margin-bottom:8px\'>Apelación enviada correctamente</p><p style=\'color:var(--gray-500);font-size:14px\'>Tu apelación será revisada por el Comité de Becas en un plazo de 10 días hábiles.</p><div style=\'margin-top:16px;padding:14px;background:var(--gray-50);border-radius:8px;font-size:13px;text-align:left\'><strong>N.º expediente:</strong> N.º de expediente<br><strong>Resolución apelada:</strong> N.º de resolución<br><strong>Plazo de respuesta:</strong> hasta fecha</div></div>')"> Presentar apelación</button> <button class="boton boton-contorno">Cancelar</button> </div> </div> <div class="tarjeta"> <div class="tarjeta-header"><div class="tarjeta-titulo">Historial de apelaciones</div></div> <div class="tabla-wrap"> <table> <thead><tr><th>N.º expediente</th><th>Resolución apelada</th><th>Fecha</th><th>Estado</th><th>Resultado</th></tr></thead> <tbody> <tr><td>N.º expediente</td><td>N.º resolución</td><td>fecha</td><td><span class="insignia insignia-verde">Resuelta</span></td><td><span style="color:var(--success);font-weight:500"> Favorable</span></td></tr> </tbody> </table> </div> <div style="text-align:center;padding:20px;color:var(--gray-400);font-size:13px" id="empty-apel" style="display:none">No hay apelaciones adicionales en el historial</div> </div>
</div>`;
}


document.getElementById('main-content').innerHTML = pagePanelBecado() + pageExpediente() + pageRenovacion() + pageJustificacion() + pageApelacion();

</script>
